    /* Header — outside sticker-layer, unaffected by zoom */
    .header-sticker {
      position: absolute;
      top: 3vh;
      left: 50%;
      transform: translateX(-50%) rotate(-1deg);
      background: #fff176;
      padding: clamp(10px, 1.5vh, 14px) clamp(20px, 4vw, 36px) clamp(12px, 1.8vh, 16px);
      border-radius: 12px;
      box-shadow: 4px 4px 0px #f9a825;
      z-index: 20;
      white-space: nowrap;
      cursor: inherit;
      text-align: center;
      line-height: 1.1;
    }

    .header-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(19px, 4.5vw, 30px);
      color: #c1440e;
      display: block;
      letter-spacing: -1px;
    }

    .header-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(9px, 2vw, 14px);
      color: #e8560a;
      display: block;
      letter-spacing: clamp(1px, 0.4vw, 2px);
      text-transform: uppercase;
      margin-top: 4px;
    }


    .header-subtitle-card {
      position: absolute;
      top: calc(3vh + 90px);
      left: 50%;
      transform: translateX(-50%) rotate(0.5deg);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(9px, 2vw, 13px);
      color: #e8560a;
      letter-spacing: clamp(0.5px, 0.3vw, 1.5px);
      text-transform: uppercase;
      white-space: nowrap;
      direction: ltr;
      z-index: 20;
      background: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      box-shadow: none;
    }

    /* Sticker base */
    .sticker {
      position: absolute;
      cursor: inherit;
      z-index: 5;
      transition: filter 0.15s, transform 0.15s;
    }

    .sticker:active { cursor: none; }

    .sticker.dragging {
      z-index: 100;
      filter: drop-shadow(4px 6px 10px rgba(0,0,0,0.18)) !important;
      transform: scale(1.06) rotate(0deg) !important;
      transition: none;
    }

    /* PNG sticker */
    .sticker-img {
      width: min(190px, 44vw);
      height: min(190px, 44vw);
      object-fit: contain;
      display: block;
      filter: drop-shadow(2px 3px 5px rgba(0,0,0,0.10));
      pointer-events: none;
      -webkit-user-drag: none;
    }


    /* Project card sticker — behind character stickers */
    #s10, #s11, #s12, #s13 { z-index: 8; transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.25s ease; }
    #s10:hover, #s11:hover, #s12:hover, #s13:hover { transform: translateY(-6px) scale(1.04) rotate(0deg) !important; filter: drop-shadow(0 10px 18px rgba(0,0,0,0.15)); }

    /* Project card sticker */
    .sticker-card {
      background: #fff;
      border-radius: 14px;
      padding: 10px 10px 14px;
      box-shadow: 3px 4px 0px rgba(0,0,0,0.13), 0 2px 12px rgba(0,0,0,0.07);
      width: min(160px, 38vw);
      cursor: inherit;
      pointer-events: none;
    }

    .sticker-card-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(28px, 5vw, 40px);
    }

    .sticker-card-label {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(9px, 1.4vw, 11px);
      color: #222;
      margin-top: 9px;
      text-align: center;
      letter-spacing: -0.3px;
    }

    .sticker-card-sub {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(7px, 1.1vw, 9px);
      color: #e8560a;
      text-align: center;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: clamp(0.5px, 0.3vw, 1.5px);
    }

    /* Cursor tooltip */
    #cursor-tooltip {
      position: fixed;
      background: #fff176;
      color: #e8560a;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 20px;
      white-space: nowrap;
      box-shadow: 2px 2px 0px #f9a825, 0 4px 12px rgba(0,0,0,0.1);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 9999;
      transform: translateX(-50%);
    }

    /* Controls */
    #controls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
    }

    #zoom-btns {
      display: flex;
      gap: 6px;
    }

    .ctrl-btn {
      background: #fff176;
      border: none;
      border-radius: 100px;
      padding: 9px 18px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #e8560a;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: inherit;
      box-shadow: 2px 2px 0px #f9a825, 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.15s;
    }

    .ctrl-btn:hover { transform: translateY(-2px); }
    .ctrl-btn:active { transform: translateY(0); }

    @media (max-width: 768px) {
      .header-sticker {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%) rotate(-1deg);
        z-index: 100;
      }

      .header-name { font-size: clamp(28px, 8vw, 42px); }
      .header-title { font-size: clamp(12px, 3vw, 16px); }
      .header-sticker { box-shadow: 4px 4px 0px #f9a825; }

      .header-subtitle-card {
        position: fixed;
        top: 110px;
        left: 50%;
        transform: translateX(-50%) rotate(0.5deg);
        white-space: normal;
        text-align: center;
        max-width: 80vw;
        font-size: clamp(9px, 2.2vw, 11px);
        z-index: 100;
      }

      #controls {
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        flex-direction: row;
        align-items: center;
      }

      #custom-cursor { display: none; }

      .sticker-img {
        width: min(130px, 32vw);
        height: min(130px, 32vw);
      }

    }

    /* ── Project Overlay ── */
    #project-overlay {
      position: fixed; inset: 0;
      background: #fff;
      z-index: 500;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }
    #project-overlay.open {
      transform: translateY(0);
      pointer-events: all;
    }
    #overlay-close {
      position: fixed; top: 24px; right: 28px;
      background: #fff176; border: none;
      border-radius: 50%; width: 44px; height: 44px;
      font-size: 18px; cursor: pointer;
      box-shadow: 2px 2px 0 #f9a825;
      font-family: 'Syne', sans-serif; font-weight: 700; color: #e8560a;
      z-index: 501; display: none;
    }
    #project-overlay.open ~ #overlay-close,
    #project-overlay.open + * #overlay-close { display: block; }
    #overlay-inner {
      max-width: 800px; margin: 0 auto;
      padding: 80px 32px 80px;
      text-align: left;
    }
    #overlay-sub {
      font-family: 'Syne', sans-serif; font-weight: 400;
      font-size: 13px; color: #e8560a;
      text-transform: uppercase; letter-spacing: 1.5px;
      margin-bottom: 8px;
    }
    #overlay-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: clamp(32px, 6vw, 56px);
      color: #222; line-height: 1.1;
      margin-bottom: 40px;
    }
    #overlay-body {
      direction: ltr;
    }
    #overlay-body p {
      font-family: 'Syne', sans-serif;
      font-size: 16px; color: #444; line-height: 1.7;
      margin-bottom: 20px;
    }
    #overlay-body img {
      width: 100%; border-radius: 12px; margin-bottom: 24px;
      display: block;
    }
    .img-carousel {
      position: relative; width: 100%; margin-bottom: 32px;
      background: #f8f8f8; border-radius: 12px; overflow: hidden;
    }
    .carousel-track {
      display: flex; transition: transform 0.3s ease;
    }
    .carousel-track img {
      min-width: 100%; width: 100%; height: 400px;
      object-fit: contain; border-radius: 0; margin: 0;
      display: block;
    }
    .carousel-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.92); border: none; border-radius: 50%;
      width: 40px; height: 40px; font-size: 22px; line-height: 1;
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      z-index: 2; color: #e8560a; font-family: sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .carousel-btn.prev { left: 10px; }
    .carousel-btn.next { right: 10px; }
    .carousel-counter {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.45); color: #fff;
      font-size: 12px; padding: 3px 10px; border-radius: 10px;
      font-family: 'Syne', sans-serif; pointer-events: none;
    }
    #overlay-body h3 {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 18px; color: #e8560a;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin: 40px 0 12px;
    }
    #overlay-body a { color: #e8560a; }
  </style>
</head>

<script>
  const STORAGE_KEY = 'sticker-positions-v3';

  // ── Zoom state ──
  let scale = 1, tx = 0, ty = 0;
  let animating = false;
  const layer = document.getElementById('sticker-layer');

  function applyTransform() {
    layer.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  }

  function applyZoom(factor, cx, cy) {
    const newScale = Math.min(Math.max(scale * factor, 0.3), 3);
    const r = newScale / scale;
    tx = cx - (cx - tx) * r;
    ty = cy - (cy - ty) * r;
    scale = newScale;
    applyTransform();
  }

  // Wheel: pinch → zoom, scroll → pan
  document.getElementById('canvas').addEventListener('wheel', e => {
    e.preventDefault();
    if (e.ctrlKey || e.metaKey) {
      applyZoom(e.deltaY < 0 ? 1.1 : 0.9, e.clientX, e.clientY);
    } else {
      tx -= e.deltaX;
      ty -= e.deltaY;
      applyTransform();
    }
  }, { passive: false });

  // ── Coordinate helpers ──
  // Convert screen px → layer (CSS) px
  function toLayer(sx, sy) {
    return { x: (sx - tx) / scale, y: (sy - ty) / scale };
  }

  // ── Positions ──
  function savePositions() {
    const pos = {};
    document.querySelectorAll('.sticker').forEach(el => {
      const l = parseFloat(el.style.left);
      const t = parseFloat(el.style.top);
      if (!isNaN(l) && !isNaN(t)) {
        pos[el.id] = {
          left: (l / window.innerWidth  * 100).toFixed(2) + 'vw',
          top:  (t / window.innerHeight * 100).toFixed(2) + 'vh',
          transform: el.style.transform,
        };
      }
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(pos));
  }

  function loadPositions() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    const pos = JSON.parse(saved);
    document.querySelectorAll('.sticker').forEach(el => {
      if (pos[el.id]) {
        el.style.left      = pos[el.id].left  || '';
        el.style.top       = pos[el.id].top   || '';
        el.style.right     = '';
        el.style.transform = pos[el.id].transform || '';
      }
    });
  }

  function resetPositions() {
    localStorage.removeItem(STORAGE_KEY);
    document.querySelectorAll('.sticker').forEach(s => {
      if (defaults[s.id]) {
        s.style.transition = 'none';
        s.style.left      = defaults[s.id].left;
        s.style.top       = defaults[s.id].top;
        s.style.transform = defaults[s.id].transform;
      }
    });
    scale = 1; tx = 0; ty = 0;
    applyTransform();
  }

  // ── Pan ──
  let panning = false;
  let panStartX = 0, panStartY = 0, panTx = 0, panTy = 0;
  const canvas = document.getElementById('canvas');

  canvas.addEventListener('mousedown', e => {
    if (animating) return;
    if (e.target.closest('.sticker')) return;
    panning = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    panTx = tx;
    panTy = ty;
    canvas.classList.add('panning');
  });

  // ── Drag ──
  let dragging = null;
  let offsetX = 0, offsetY = 0;
  let dragMoved = false;
  let dragStartX = 0, dragStartY = 0;

  function startDrag(sticker, clientX, clientY) {
    if (animating) return;
    dragging = sticker;
    dragMoved = false;
    dragStartX = clientX;
    dragStartY = clientY;
    tooltip.style.opacity = '0';
    sticker.classList.add('dragging');
    const rect = sticker.getBoundingClientRect();
    // Offset stays in screen coords
    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;
    // Convert current screen position to layer coords
    const lp = toLayer(rect.left, rect.top);
    sticker.style.left  = lp.x + 'px';
    sticker.style.right = '';
    sticker.style.top   = lp.y + 'px';
  }

  function moveDrag(clientX, clientY) {
    if (!dragging) return;
    if (Math.abs(clientX - dragStartX) > 4 || Math.abs(clientY - dragStartY) > 4) dragMoved = true;
    const lp = toLayer(clientX - offsetX, clientY - offsetY);
    dragging.style.left = lp.x + 'px';
    dragging.style.top  = lp.y + 'px';
  }

  function endDrag() {
    if (!dragging) return;
    const s = dragging;
    dragging.classList.remove('dragging');
    savePositions();
    dragging = null;
    customCursor.src = 'Cursor/SMALL.svg';
    if (!dragMoved && s.dataset.link) window.open(s.dataset.link, '_blank');
  }

  // ── Pinch zoom (mobile) ──
  let lastPinchDist = null;

  function pinchDist(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  let touchPanStart = null;

  document.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      lastPinchDist = pinchDist(e.touches);
      touchPanStart = null;
    } else if (e.touches.length === 1 && !dragging) {
      if (!e.target.closest('.sticker')) {
        touchPanStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, tx, ty };
      }
    }
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (e.target.closest('#project-overlay')) return;
    e.preventDefault();
    if (e.touches.length === 2) {
      const dist = pinchDist(e.touches);
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      if (lastPinchDist) applyZoom(dist / lastPinchDist, cx, cy);
      lastPinchDist = dist;
    } else if (e.touches.length === 1) {
      if (dragging) {
        moveDrag(e.touches[0].clientX, e.touches[0].clientY);
      } else if (touchPanStart) {
        tx = touchPanStart.tx + (e.touches[0].clientX - touchPanStart.x);
        ty = touchPanStart.ty + (e.touches[0].clientY - touchPanStart.y);
        applyTransform();
      }
    }
  }, { passive: false });

  document.addEventListener('touchend', e => {
    if (e.touches.length < 2) lastPinchDist = null;
    if (e.touches.length === 0) { endDrag(); touchPanStart = null; }
  });

  // ── Tooltip ──
  const tooltip = document.getElementById('cursor-tooltip');

  document.querySelectorAll('.sticker').forEach(sticker => {
    sticker.addEventListener('mouseenter', () => {
      if (dragging) return;
      tooltip.textContent = sticker.dataset.label || '';
      tooltip.style.opacity = '1';
      customCursor.src = sticker.dataset.static ? 'Cursor/Hand-Press.svg' : 'Cursor/Hand-Moove.svg';
    });
    sticker.addEventListener('mouseleave', () => {
      tooltip.style.opacity = '0';
      if (!dragging) customCursor.src = 'Cursor/SMALL.svg';
    });
    if (!sticker.dataset.static) {
      sticker.addEventListener('mousedown', e => {
        e.preventDefault();
        customCursor.src = 'Cursor/Hand-Grab.svg';
        startDrag(sticker, e.clientX, e.clientY);
      });
      sticker.addEventListener('touchstart', e => {
        if (e.touches.length === 1) {
          e.preventDefault();
          startDrag(sticker, e.touches[0].clientX, e.touches[0].clientY);
        }
      }, { passive: false });
    } else {
      sticker.style.cursor = 'pointer';
      sticker.addEventListener('click', () => openOverlay(sticker.id));
    }
  });

  // ── Single unified mousemove via rAF ──
  let mouseX = 0, mouseY = 0, rafId = null;
  const customCursor = document.getElementById('custom-cursor');

  function onFrame() {
    rafId = null;
    customCursor.style.left = mouseX + 'px';
    customCursor.style.top  = mouseY + 'px';
    tooltip.style.left = mouseX + 'px';
    tooltip.style.top  = (mouseY + 28) + 'px';
    if (panning) {
      tx = panTx + (mouseX - panStartX);
      ty = panTy + (mouseY - panStartY);
      applyTransform();
    }
    if (dragging) {
      const lp = toLayer(mouseX - offsetX, mouseY - offsetY);
      dragging.style.left = lp.x + 'px';
      dragging.style.top  = lp.y + 'px';
    }
  }

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (!rafId) rafId = requestAnimationFrame(onFrame);
  });

  document.addEventListener('mouseup', () => {
    endDrag();
    panning = false;
    canvas.classList.remove('panning');
  });


  // ── Intro animation ──
  function runIntroAnimation() {
    animating = true;
    const stickers = [...document.querySelectorAll('.sticker')].filter(s => !s.dataset.static);

    // Convert vw/vh → px so CSS can animate between units
    function toPx(val) {
      if (!val) return '0px';
      if (val.endsWith('vw')) return (parseFloat(val) / 100 * window.innerWidth)  + 'px';
      if (val.endsWith('vh')) return (parseFloat(val) / 100 * window.innerHeight) + 'px';
      return val;
    }

    // Store final positions in px
    const targets = stickers.map(s => ({
      left: toPx(s.style.left),
      top:  toPx(s.style.top),
      transform: s.style.transform
    }));

    // Pre-set stickers to their px targets (no transition) so the pile can animate back
    stickers.forEach((s, i) => {
      s.style.transition = 'none';
      s.style.left = targets[i].left;
      s.style.top  = targets[i].top;
    });

    // Pile: center of viewport (px)
    const cx = (window.innerWidth  / 2 - 80) + 'px';
    const cy = (window.innerHeight / 2 - 80) + 'px';

    // Stack all stickers in a pile at center
    stickers.forEach((s, i) => {
      const jitter = (i - stickers.length / 2) * 4;
      s.style.transition = 'none';
      s.style.left = cx;
      s.style.top  = cy;
      s.style.transform = `rotate(${jitter}deg) scale(0.85)`;
      s.style.zIndex = String(50 + i);
    });

    // Small pause so pile renders, then scatter
    setTimeout(() => {
      const ease = 'cubic-bezier(0.22, 1, 0.36, 1)';
      stickers.forEach((s, i) => {
        s.style.transition = `left 0.55s ${ease}, top 0.55s ${ease}, transform 0.45s ${ease}`;
        s.style.left      = targets[i].left;
        s.style.top       = targets[i].top;
        s.style.transform = targets[i].transform;
        s.style.zIndex    = '5';
      });

      // After stickers land, clean up
      setTimeout(() => {
        stickers.forEach(s => {
          s.style.transition = '';
          s.style.zIndex     = '';
        });
        animating = false;
      }, 650);
    }, 300);
  }

  // Save HTML defaults before loadPositions overwrites them
  const defaults = {};
  document.querySelectorAll('.sticker').forEach(s => {
    defaults[s.id] = { left: s.style.left, top: s.style.top, transform: s.style.transform };
  });

  loadPositions();
  runIntroAnimation();

  // Scale and center sticker layer on mobile
  if (window.innerWidth <= 768) {
    scale = 0.85;
    const contentW = window.innerWidth;
    const contentH = window.innerHeight;
    tx = contentW * (1 - scale) / 2 - contentW * 0.05;
    ty = contentH * (1 - scale) / 2 - contentH * 0.05;
    applyTransform();
  }

      title: 'Jewrist',
      sub: 'Kosher Tourism App · 2022',
      body: `
        <p>Jewish people who keep the laws of 'Kosher' find a hard time when it comes to planning a new trip — is there kosher food, restaurants, hotels, and apartments in the destination?</p>
        <p><strong>Solution:</strong> An app that gathers all the correct and accurate information about Kosher resources almost all over the world.</p>

        <h3>❤️ Empathize — Survey &amp; Interview</h3>
        <p>I assumed kosher travelers would look for kosher restaurants, shops, and accommodations. A survey posted on Facebook and WhatsApp groups revealed a different picture.</p>
        <p><strong>Survey findings:</strong> Most respondents travel at least once a year. Kosher restaurants and kosher hotels are equally popular. People prefer destinations with a Jewish community or Bet Chabad. Kosher vacations are usually not organized by a single app. People are not very interested in local Jewish-history sites.</p>
        <p><strong>Key features requested:</strong> Price comparisons and user ratings / Kosher restaurants by destination / Kosher product photos and kashrut info / Filtering restaurants by location / Barcode scanning for kosher products</p>
        <div data-carousel>
          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/601a8dd2-8839-4d57-aadf-683690acf4ff_rw_1200.png?h=6b17f1e1a8fa9e9f4575db03ffb181ff" loading="eager" alt="Survey" />

          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/4cb2a622-6318-4adb-9448-b7850313dbe8_rw_1200.png?h=a484936056c0edd6dc861f42270a4a4c" loading="eager" alt="Survey" />
          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/b4f8fc1d-28fb-4b19-a719-f895a0877200_rw_1200.png?h=281db09b8f4d53b5ac2881fcfbe8aebe" loading="eager" alt="Survey" />
          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/e5e34192-7084-4d24-9318-0be9bb011bee_rw_1200.png?h=0b1a906d7ba03a4c7dfbffaceab6ba77" loading="eager" alt="Survey" />
          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/f5402cc7-4675-4f07-8980-a7c2758249b8_rw_1200.png?h=3315dc18f6dc76a90ad85f99ae58e589" loading="eager" alt="Survey" />
          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/466a88b7-8f2c-424f-8e15-d92c2975110a_rw_1200.png?h=7a689457d90d4108132cd1b1bc6ba80c" loading="eager" alt="Survey" />
          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/b5735698-77d9-4aca-a0ea-730f63c14fb1_rw_1200.png?h=0026e292b5c2725d3e9d8bafd5f6d7e8" loading="eager" alt="Survey" />
        </div>

        <h3>🎤 Interviews</h3>
        <p>I conducted interviews with kosher observant people who travel abroad with their families. Beyond the quantitative survey data, I gained qualitative and in-depth information — a better understanding of users' pain points.</p>
        <p><strong>Conclusions:</strong> Need a list of kosher products (including unmarked ones) / Kosher restaurants list / Small private places and B&Bs / Community-updatable content / Save for later functionality</p>

          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/c027f55f-8996-4d1f-a5cf-c2fa52f52c73_rw_1920.png?h=8b2613cc63a20be5dd7cf8944ee60c44" loading="eager" alt="Interview notes" />

        </div>

        <h3>📱 Prototype, UI &amp; User Testing #1</h3>
        <div data-carousel>
          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/907abb60-d549-4df4-b2b8-bec3faa40d8c_rw_600.png?h=74cfc55688391fe44e3b9a5b5ed1a595" loading="eager" alt="Prototype v1" />
          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/52e16f67-7bf1-40a6-8919-25839ddb84bd_rw_600.png?h=1f351f499a07f96c23fe28a2b84fbf68" loading="eager" alt="Prototype v1" />
          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/63f96fd3-4a42-42a5-9d59-ad927cb40bca_rw_600.png?h=bce7c09647fe2a5e8a71885d3c595684" loading="eager" alt="Prototype v1" />
          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/24fa2455-c1fa-4bf2-8508-63e2adf429ff_rw_600.png?h=4a47553c9c48b8c6d9ca63ab0b897fdd" loading="eager" alt="Prototype v1" />
          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/45d3538e-a186-4075-8c1c-cc8276b22d08_rw_600.png?h=a9d97710db0220b00ffa3c12b0e33180" loading="eager" alt="Prototype v1" />
        </div>
        <p><strong>Problems found in testing:</strong> Users didn't understand the map/list view toggle. The 'to-stay' &amp; 'to-eat' tabs were confused with planning/saving. Users wanted to see both accommodations and restaurants together.</p>
        <p><strong>Key insight:</strong> Remove the map/list toggle buttons. Consolidate to 3 tabs.</p>

        <div data-carousel>

    s12: {
      title: 'ZOOM For Orthodox',
      sub: 'Feature Redesign · 2022',
      body: `
        <p>A redesign of the ZOOM screen-sharing feature for better accessibility — aimed at Orthodox Jewish users who usually don't speak English but use ZOOM heavily for learning and Torah study.</p>

        <h3>● Problem</h3>
        <p>The English-only interface caused fear and confusion. Users were afraid of accidentally sharing private content instead of relevant documents.</p>
        <div data-carousel>
          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/a6b2b90d-1ca9-438b-9926-492b83b62d48_rw_1200.png?h=f220abfbcdda0873d0c7c6ccb0a03c6e" loading="eager" alt="Research" />
          <img src="https://cdn.myportfolio.com/918cecb4-4b61-4903-a07a-9e3017e81acf/72ecb9a1-eefc-4404-afbd-340f827d38a5_rw_1200.png?h=b42872e82c14861fd4b7b378e02010f0" loading="eager" alt="Research" />
        </div>

        <h3>🔍 Research — Empathize &amp; Define</h3>
        <p>User interviews revealed that ultra-Orthodox students love ZOOM — it saves them time and money. The main pain point was screen sharing: unclear options caused anxiety about accidentally sharing personal information.</p>

  const overlay     = document.getElementById('project-overlay');
  const overlayClose = document.getElementById('overlay-close');

  function openOverlay(id) {
    const data = projectData[id];
    if (!data) return;
    document.getElementById('overlay-title').textContent = data.title;
    document.getElementById('overlay-sub').textContent   = data.sub;
    document.getElementById('overlay-body').innerHTML    = data.body;
    initCarousels(document.getElementById('overlay-body'));
    const lazyIframe = document.querySelector('#overlay-body iframe[data-src]');
    if (lazyIframe) lazyIframe.src = lazyIframe.dataset.src;
    const hero = document.getElementById('overlay-hero');
    if (data.hero) {
      hero.innerHTML = data.hero;
      hero.style.display = 'block';
    } else {
      hero.innerHTML = '';
      hero.style.display = 'none';
    }
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
    overlayClose.style.display = 'block';
    document.body.style.overflow = 'hidden';
    history.pushState({ overlay: id }, '', '#' + id);
  }

  function closeOverlay() {
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
    overlayClose.style.display = 'none';
    document.body.style.overflow = '';
    if (location.hash) history.back();
  }

  overlayClose.addEventListener('click', closeOverlay);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });
  window.addEventListener('popstate', () => { if (!location.hash) closeOverlay(); });

  function initCarousels(container) {
    container.querySelectorAll('[data-carousel]').forEach(div => {
      const imgs = Array.from(div.querySelectorAll('img'));
      if (!imgs.length) return;
      div.replaceWith(buildCarousel(imgs));
    });
  }

  function buildCarousel(imgs) {
    const wrap = document.createElement('div');
    if (imgs.length === 1) {
      imgs[0].style.borderRadius = '12px';
      wrap.style.marginBottom = '24px';
      wrap.appendChild(imgs[0]);
      return wrap;
    }
    wrap.className = 'img-carousel';
    const track = document.createElement('div');
    track.className = 'carousel-track';
    imgs.forEach(img => { img.style.cssText = ''; track.appendChild(img); });
    const counter = document.createElement('div');
    counter.className = 'carousel-counter';
    let cur = 0;
    function goTo(n) {
      cur = (n + imgs.length) % imgs.length;
      track.style.transform = 'translateX(-' + (cur * 100) + '%)';
      counter.textContent = (cur + 1) + ' / ' + imgs.length;
    }
    const prev = document.createElement('button');
    prev.className = 'carousel-btn prev'; prev.innerHTML = '&#8249;';
    prev.onclick = () => goTo(cur - 1);
    const next = document.createElement('button');
    next.className = 'carousel-btn next'; next.innerHTML = '&#8250;';
    next.onclick = () => goTo(cur + 1);
    counter.textContent = '1 / ' + imgs.length;
    wrap.append(track, prev, next, counter);
    return wrap;
  }

</script>
